<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP locked to self + Google Fonts + the WSS chat origins + the live BTC feed
      + the radio stream hosts + the YouTube iframe origin (TV / Video / MONITOR
      tabs). connect-src lists the MQTT brokers (EMQX primary, mosquitto fallback)
      and the Coinbase WS feed; media-src lists the audio stream hosts; frame-src
      allows the YouTube embeds only.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; media-src 'self' https://*.somafm.com https://stream.nightride.fm https://stream.laut.fm https://streams.80s80s.de; connect-src 'self' wss://broker.emqx.io:8084 wss://test.mosquitto.org:8081 wss://ws-feed.exchange.coinbase.com https://*.somafm.com https://stream.nightride.fm https://stream.laut.fm https://streams.80s80s.de; frame-src https://www.youtube.com https://www.youtube-nocookie.com"
    />
    <title>NEXUS-7</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
  </head>
  <body>
    <!-- custom titlebar (frameless window): wordmark + min/max/close -->
    <div id="titlebar" class="titlebar"></div>

    <!-- 3-column grid + bottom ticker -->
    <div id="app">
      <!-- left column: three stacked boxes -->
      <section id="col-left" class="col col--left">
        <div id="box-friend" class="box box--friend"></div>
        <div id="box-owner" class="box box--owner"></div>
        <div id="box-chart" class="box box--chart"></div>
      </section>

      <!-- center: Bitcoin command center -->
      <section id="center" class="col col--center"></section>

      <!-- right column: tabbed news/live (top) + chat (bottom) -->
      <section id="col-right" class="col col--right">
        <div id="panel-news" class="panel panel--news"></div>
        <div id="panel-chat" class="panel panel--chat"></div>
      </section>

      <!-- bottom: full-width scrolling ticker -->
      <footer id="ticker" class="ticker"></footer>
    </div>

    <!-- single contained overlay layer (pointer-events:none): banners, HACKED/LFG -->
    <div id="overlay-root" class="overlay-root"></div>

    <!--
      mqtt.js as the prebuilt, self-contained UMD browser bundle (defines window.mqtt),
      loaded as a plain 'self' script BEFORE the module. The npm 'mqtt' import does not
      survive Vite's production rollup bundling (the chat connects in dev:web but the
      packaged build silently never sends CONNECT); this vendored browser build does.
    -->
    <script src="./vendor/mqtt.min.js"></script>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
